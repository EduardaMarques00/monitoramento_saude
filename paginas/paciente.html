<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pacientes</title>
  <style>
    body { font-family: sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
    a { color: #555; font-size: 13px; }
    h1 { margin-bottom: 16px; }

    /* Barra topo */
    .topo { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .topo input { padding: 7px 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; width: 220px; }

    /* Botões */
    button { padding: 7px 16px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-novo  { background: #4caf50; color: #fff; }
    .btn-edit  { background: #2196f3; color: #fff; font-size: 12px; padding: 4px 10px; }
    .btn-del   { background: #f44336; color: #fff; font-size: 12px; padding: 4px 10px; }

    /* Tabela */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
    th { background: #f5f5f5; }

    /* Mensagem */
    .msg { font-size: 14px; color: #333; min-height: 20px; margin-bottom: 8px; }

    /* Modal overlay */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 10;
      align-items: center;
      justify-content: center;
    }
    .overlay.ativo { display: flex; }

    /* Modal caixa */
    .modal {
      background: #fff;
      border-radius: 8px;
      padding: 28px 32px;
      width: 480px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 4px 24px rgba(0,0,0,.2);
    }
    .modal h2 { margin: 0 0 8px; font-size: 18px; }
    .modal h3 { margin: 16px 0 8px; font-size: 14px; color: #666; border-top: 1px solid #eee; padding-top: 12px; }
    .campo { display: flex; flex-direction: column; margin-bottom: 12px; }
    .campo label { font-size: 13px; color: #444; margin-bottom: 4px; }
    .campo input { padding: 7px 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
    .linha { display: flex; gap: 10px; }
    .linha .campo { flex: 1; }
    .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .btn-cancelar { background: #e0e0e0; color: #333; }
    .btn-salvar   { background: #4caf50; color: #fff; }
    .erro-modal { font-size: 13px; color: #c62828; min-height: 18px; margin-top: 4px; }
    .id-gerado { font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <a href="index.html">← Voltar</a>
  <h1>Pacientes</h1>

  <div class="topo">
    <button class="btn-novo" onclick="abrirModal()">+ Novo paciente</button>
    <input id="filtro" placeholder="Buscar por ID ou nome" oninput="carregar()">
  </div>

  <div class="msg" id="msg"></div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Tipo sanguíneo</th>
        <th>Altura (cm)</th>
        <th>Peso inicial (kg)</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

  <!-- Modal -->
  <div class="overlay" id="overlay" onclick="fecharSeForaDoModal(event)">
    <div class="modal" id="modal">
      <h2 id="modal-titulo">Novo paciente</h2>
      <div class="id-gerado" id="id-gerado"></div>

      <h3>Dados pessoais (Usuário)</h3>
      <div class="campo">
        <label>Nome completo *</label>
        <input id="m_nome" placeholder="ex: Maria da Silva">
      </div>
      <div class="linha">
        <div class="campo">
          <label>CPF *</label>
          <input id="m_cpf" placeholder="000.000.000-00">
        </div>
        <div class="campo">
          <label>Data de nascimento</label>
          <input id="m_nascimento" type="date">
        </div>
      </div>
      <div class="linha">
        <div class="campo">
          <label>Email *</label>
          <input id="m_email" type="email" placeholder="email@exemplo.com">
        </div>
        <div class="campo">
          <label>Senha *</label>
          <input id="m_senha" type="password">
        </div>
      </div>
      <div class="linha">
        <div class="campo" style="flex:3">
          <label>Rua</label>
          <input id="m_rua" placeholder="ex: Rua das Flores">
        </div>
        <div class="campo" style="flex:1">
          <label>Número</label>
          <input id="m_numero" placeholder="123">
        </div>
      </div>
      <div class="linha">
        <div class="campo">
          <label>Bairro</label>
          <input id="m_bairro">
        </div>
        <div class="campo">
          <label>Cidade</label>
          <input id="m_cidade">
        </div>
      </div>
      <div class="linha">
        <div class="campo">
          <label>Estado</label>
          <input id="m_estado" maxlength="2" placeholder="ex: CE">
        </div>
        <div class="campo">
          <label>CEP</label>
          <input id="m_cep" placeholder="00000-000">
        </div>
      </div>

      <h3>Dados clínicos (Paciente)</h3>
      <div class="linha">
        <div class="campo">
          <label>Tipo sanguíneo</label>
          <input id="m_tipo_sang" placeholder="ex: A+">
        </div>
        <div class="campo">
          <label>Altura (cm)</label>
          <input id="m_altura" type="number" step="0.1" placeholder="ex: 170">
        </div>
        <div class="campo">
          <label>Peso inicial (kg)</label>
          <input id="m_peso" type="number" step="0.1" placeholder="ex: 70.5">
        </div>
      </div>

      <div class="erro-modal" id="erro-modal"></div>

      <div class="modal-btns">
        <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        <button class="btn-salvar" onclick="salvar()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    let modoEdicao = null; // null = incluindo, string (id) = editando

    async function api(url, metodo = "GET", corpo = null) {
      const opts = { method: metodo, headers: { "Content-Type": "application/json" } };
      if (corpo) opts.body = JSON.stringify(corpo);
      const r = await fetch(url, opts);
      return r.json();
    }

    function msg(texto) { document.getElementById("msg").textContent = texto; }

    async function carregar() {
      const filtro = document.getElementById("filtro").value;
      const dados = await api(`/api/pacientes/?filtro=${encodeURIComponent(filtro)}`);
      document.getElementById("tabela").innerHTML = dados.map(p => `
        <tr>
          <td>${p.id_usuario}</td>
          <td>${p.nome_completo ?? "—"}</td>
          <td>${p.tipo_sanguineo ?? "—"}</td>
          <td>${p.altura_cm ?? "—"}</td>
          <td>${p.peso_inicial_kg ?? "—"}</td>
          <td>
            <button class="btn-edit" onclick='abrirEdicao(${JSON.stringify(p)})'>Editar</button>
            <button class="btn-del"  onclick="remover('${p.id_usuario}')">Remover</button>
          </td>
        </tr>`).join("");
    }

    function limparCampos() {
      ["m_nome","m_cpf","m_nascimento","m_email","m_senha","m_rua","m_numero",
       "m_bairro","m_cidade","m_estado","m_cep","m_tipo_sang","m_altura","m_peso"
      ].forEach(id => document.getElementById(id).value = "");
    }

    function abrirModal() {
      modoEdicao = null;
      document.getElementById("modal-titulo").textContent = "Novo paciente";
      document.getElementById("id-gerado").textContent = "O ID do usuário será gerado automaticamente.";
      limparCampos();
      document.getElementById("m_senha").required = true;
      document.getElementById("overlay").classList.add("ativo");
      document.getElementById("m_nome").focus();
    }

    function abrirEdicao(p) {
      modoEdicao = p.id_usuario;
      document.getElementById("modal-titulo").textContent = "Editar paciente";
      document.getElementById("id-gerado").textContent = `ID: ${p.id_usuario}`;
      document.getElementById("m_nome").value = p.nome_completo ?? "";
      document.getElementById("m_cpf").value = p.cpf ?? "";
      document.getElementById("m_nascimento").value = p.data_nascimento ?? "";
      document.getElementById("m_email").value = p.email ?? "";
      document.getElementById("m_senha").value = "";
      document.getElementById("m_rua").value = p.rua ?? "";
      document.getElementById("m_numero").value = p.numero ?? "";
      document.getElementById("m_bairro").value = p.bairro ?? "";
      document.getElementById("m_cidade").value = p.cidade ?? "";
      document.getElementById("m_estado").value = p.estado ?? "";
      document.getElementById("m_cep").value = p.cep ?? "";
      document.getElementById("m_tipo_sang").value = p.tipo_sanguineo ?? "";
      document.getElementById("m_altura").value = p.altura_cm ?? "";
      document.getElementById("m_peso").value = p.peso_inicial_kg ?? "";
      document.getElementById("overlay").classList.add("ativo");
    }

    function erroModal(texto) { document.getElementById("erro-modal").textContent = texto; }

    function fecharModal() {
      document.getElementById("overlay").classList.remove("ativo");
      erroModal("");
    }

    function fecharSeForaDoModal(e) {
      if (e.target === document.getElementById("overlay")) fecharModal();
    }

    async function salvar() {
      const nome = document.getElementById("m_nome").value.trim();
      const cpf = document.getElementById("m_cpf").value.trim();
      const email = document.getElementById("m_email").value.trim();
      const senha = document.getElementById("m_senha").value;

      if (!nome || !cpf || !email || (!modoEdicao && !senha)) {
        erroModal("Preencha os campos obrigatórios: nome, CPF, email" + (modoEdicao ? "." : " e senha."));
        return;
      }
      erroModal("");

      const corpo = {
        nome_completo: nome,
        cpf: cpf,
        data_nascimento: document.getElementById("m_nascimento").value || null,
        email: email,
        senha: senha || undefined,
        rua: document.getElementById("m_rua").value.trim() || null,
        numero: document.getElementById("m_numero").value.trim() || null,
        bairro: document.getElementById("m_bairro").value.trim() || null,
        cidade: document.getElementById("m_cidade").value.trim() || null,
        estado: document.getElementById("m_estado").value.trim() || null,
        cep: document.getElementById("m_cep").value.trim() || null,
        tipo_sanguineo: document.getElementById("m_tipo_sang").value.trim() || null,
        altura_cm: parseFloat(document.getElementById("m_altura").value) || null,
        peso_inicial_kg: parseFloat(document.getElementById("m_peso").value) || null,
      };

      let r;
      if (modoEdicao) {
        r = await api(`/api/pacientes/${encodeURIComponent(modoEdicao)}`, "PUT", corpo);
        if (!r.ok) { erroModal(r.erro ?? "Erro ao atualizar."); return; }
        msg("Paciente atualizado.");
      } else {
        r = await api("/api/pacientes/", "POST", corpo);
        if (!r.ok) { erroModal(r.erro ?? "Erro ao incluir."); return; }
        msg(`Paciente incluído com ID ${r.id_usuario}.`);
      }

      fecharModal();
      carregar();
    }

    async function remover(id) {
      if (!confirm(`Remover paciente '${id}'? Isso também removerá o usuário associado.`)) return;
      const r = await api(`/api/pacientes/${encodeURIComponent(id)}`, "DELETE");
      msg(r.ok ? "Paciente removido." : (r.erro ?? "Erro ao remover."));
      carregar();
    }

    document.addEventListener("keydown", e => { if (e.key === "Escape") fecharModal(); });

    carregar();
  </script>
</body>
</html>
